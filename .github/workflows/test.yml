name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python Tests
    runs-on: mayflower-k8s-runners
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run unit tests with coverage
        run: >-
          uv run pytest
          -m "not integration"
          --cov=padv
          --cov-report=xml:coverage.xml
          --cov-report=term
          --junitxml=test-results.xml
          --tb=short
          -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            coverage.xml
            test-results.xml
          retention-days: 14
          if-no-files-found: warn

  sonarqube:
    name: SonarQube
    needs: test
    if: >-
      ${{
        always() &&
        (needs.test.result == 'success' || needs.test.result == 'failure')
      }}
    runs-on: mayflower-k8s-runners
    steps:
      - name: Check SonarQube secrets availability
        id: sonar_secrets
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_HOST_URL}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets are not configured; skipping SonarQube scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.sonar_secrets.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Download test results (Python 3.12)
        if: steps.sonar_secrets.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: test-results-py3.12
          path: .

      - name: Validate coverage report
        if: steps.sonar_secrets.outputs.skip != 'true'
        run: |
          if [ ! -f coverage.xml ]; then
            echo "Missing coverage.xml"
            exit 1
          fi
          echo "Coverage report found."

      - name: Cache SonarQube scanner
        if: steps.sonar_secrets.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}-${{ hashFiles('sonar-project.properties') }}
          restore-keys: sonar-${{ runner.os }}-

      - name: SonarQube Scan
        if: steps.sonar_secrets.outputs.skip != 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >-
            -Dsonar.qualitygate.wait=false
