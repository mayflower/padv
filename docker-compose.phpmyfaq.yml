services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: phpmyfaq
      MYSQL_USER: phpmyfaq
      MYSQL_PASSWORD: phpmyfaq
      MYSQL_ROOT_HOST: "%"
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - ./targets/phpMyFAQ/volumes/mariadb:/var/lib/mysql

  apache:
    build:
      context: .
      dockerfile: docker/phpmyfaq/apache-morcilla.Dockerfile
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PMF_DB_HOST: mariadb
      PMF_DB_NAME: phpmyfaq
      PMF_DB_USER: phpmyfaq
      PMF_DB_PASS: phpmyfaq
      DISABLE_HTACCESS: ""
      PMF_TIMEZONE: "Europe/Berlin"
      PMF_ENABLE_UPLOADS: "On"
      PMF_MEMORY_LIMIT: "2048M"
      PHP_LOG_ERRORS: "On"
      PHP_ERROR_REPORTING: "E_ALL & ~E_DEPRECATED"
    ports:
      - "18080:80"
      - "18443:443"
    volumes:
      - ./targets/phpMyFAQ/phpmyfaq:/var/www/html
