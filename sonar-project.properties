sonar.projectKey=mayflower_padv

# Source directories
sonar.sources=padv

# Exclusions
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**,**/*.egg-info/**,**/uv.lock

# Test file patterns
sonar.tests=tests
sonar.test.inclusions=**/test_*.py

# Python settings
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
